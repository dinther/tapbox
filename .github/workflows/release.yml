name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: tapbox ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            docs/bootloader.bin
            docs/partitions.bin
            docs/firmware.bin
